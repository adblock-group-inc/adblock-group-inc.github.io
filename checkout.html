<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>adblock</title>
    <link rel="stylesheet" href="/css/style.css">
    <script defer="defer" src="/./js/app.js"></script>

    <meta name="description" content="">

    <meta property="og:title" content="">
    <meta property="og:type" content="">
    <meta property="og:url" content="">
    <meta property="og:image" content="">
    <meta property="og:image:alt" content="">

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
    <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
      <link rel="icon" type="image/png" href="/android-chrome-192x192.png" sizes="192x192">
    <link rel="icon" type="image/png" href="/android-chrome-512x512.png" sizes="512x512">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#fff">
    <script defer src="https://cdn.jsdelivr.net/npm/quicklink@3.0.1/dist/quicklink.umd.js"></script>
    <script>
      window.addEventListener('load', () => {
        quicklink.listen();
      });
    </script>
</head>

<body>


    <div class="page-wrapper">
        <header>
            <a href="/index.html">
                <img src="/public/img/assets_adblock13.webp" alt="">
            </a>
        </header>

        <section class="main-section">
            <nav aria-label="primary">
                <ul class="cluster" role="list">
                    <li>
                        <a href="/index.html">Hem</a>
                    </li>
                    <li>
                        <a href="products.html">Våra produkter</a>
                    </li>
                    <li>
                        <a href="contact.html">Kontakt</a>
                    </li>
                    <li>
                        <a href="checkout.html" aria-current="page">
                            <i class="icon icon-shopping-cart"></i>
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="checkout-page">
                <article class="checkout-card repel" data-direction="column" hidden>
                    <ul class="checkout-items flow" id="cartList" role="list"></ul>
                    <div class="cart-total btn yellow-btn" id="cartTotal" hidden></div>
                </article>

                <article id="cartEmpty" class="cart-empty-card repel"  data-direction="column" data-nowrap hidden>
                    <h3>din kundvagn är tom.</h3>

                    <figure>
                        <img src="/public/img/icons/kundvagn.png" alt="" width="250">
                    </figure>

                    <a href="/products.html" class="btn yellow-btn">till våra produkter</a>
                </article>
            </main>


        </section>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('adblock-cart') || '[]');
        const list = document.getElementById('cartList');
        const emptyMsg = document.getElementById('cartEmpty');
        const totalEl = document.getElementById('cartTotal');
        const checkoutCard = document.querySelector('.checkout-card');

        function save() {
            localStorage.setItem('adblock-cart', JSON.stringify(cart));
            window.dispatchEvent(new CustomEvent('cart-changed'));
        }

        function render() {
            list.innerHTML = '';
            if (cart.length === 0) {
                checkoutCard.hidden = true;
                emptyMsg.hidden = false;
                totalEl.hidden = true;
                return;
            }
            checkoutCard.hidden = false;
            emptyMsg.hidden = true;
            let total = 0;
            cart.forEach((item, i) => {
                const price = parseInt((item.price || '').match(/(\d+)/)?.[1] ?? 0);
                total += price * item.qty;
                const li = document.createElement('li');
                li.className = 'checkout-item repel';
                li.innerHTML = `
                    <span>${item.name}${item.qty > 1 ? ' ×' + item.qty : ''}</span>
                    <div class="repel price-info">
                    <span class="btn grey-btn" data-width="fit-content">${item.price}</span>

                    <button class="trash-btn" aria-label="Ta bort ${item.name}">
                            <i class="icon icon-trash-can"></i>
                    </button>
                    </div>
                    `;
                li.querySelector('.trash-btn').addEventListener('click', () => {
                    if (cart[i].qty > 1) {
                        cart[i].qty--;
                    } else {
                        cart.splice(i, 1);
                    }
                    save();
                    render();
                });
                list.appendChild(li);
            });
            totalEl.textContent = `totalt: ${total} kr`;
            totalEl.hidden = false;
        }

        render();
    </script>

</body>

</html>
